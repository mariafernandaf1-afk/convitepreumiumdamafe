<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite MAFÊ 18</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- CAPA -->
<div id="capa" class="tela ativa">

  <h1>CONVITE ESPECIAL</h1>

  <div class="envelope" onclick="abrirConvite()">
    ✉️
  </div>

  <p class="clique">CLIQUE PARA ABRIR</p>

  <div class="decoracao">
    ✨ 🪩 ✨ 🪩 ✨
  </div>

</div>

<!-- CONVITE -->
<div id="convite" class="tela">

  <div class="card">

    <h2 class="nome">MAFÊ</h2>

    <div class="idade">18</div>

    <img src="foto.jpg" class="foto" alt="foto">

    <p class="data">
      Sábado • 25 Julho 2026 • 20:00h
    </p>

    <div class="box">
      <h3>📍 Local</h3>
      <p>Sítio do Tio Nivaldo - MG</p>
      <a class="btn" target="_blank"
         href="https://www.google.com/maps">
        Ver localização
      </a>
    </div>

    <div class="box">
      <h3>👗 Dress Code</h3>
      <p>ALL BLACK PARTY</p>
    </div>

    <div class="box">
      <h3>🎵 Playlist</h3>
      <a class="btn" target="_blank"
         href="https://open.spotify.com">
        Abrir Spotify
      </a>
    </div>

    <div class="box">
      <h3>💌 Confirmação</h3>
      <a class="btn green"
         href="https://wa.me/55SEUNUMEROAQUI?text=Confirmo%20presença%20🎉">
        Confirmar presença
      </a>
    </div>

    <p class="final">
      CONTO COM VOCÊ ✨<br>
      não falte 🖤
    </p>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
